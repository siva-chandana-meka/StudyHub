<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — StudyHub</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-page">
  <div class="auth-box">
    <h1>StudyHub</h1>
    <p id="session-msg" class="error hidden" style="color: var(--muted);"></p>
    <p id="error" class="error hidden"></p>
    <form id="login-form">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autocomplete="email" />
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" />
      <button type="submit">Log in</button>
    </form>
    <p style="margin-top: 1rem; text-align: center; color: var(--muted);">
      No account? <a href="/register.html">Register</a>
    </p>
  </div>
  <script src="/js/api.js"></script>
  <script>
    if (getToken()) location.href = "/index.html";
    if (new URLSearchParams(location.search).get("session") === "expired") {
      const msg = document.getElementById("session-msg");
      msg.textContent = "Session expired or invalid. Please log in again.";
      msg.classList.remove("hidden");
    }
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errEl = document.getElementById("error");
      errEl.classList.add("hidden");
      try {
        const body = {
          email: document.getElementById("email").value,
          password: document.getElementById("password").value,
        };
        const data = await api("/api/auth/login", {
          method: "POST",
          body: JSON.stringify(body),
        });
        setToken(data.access_token);
        location.href = "/index.html";
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove("hidden");
      }
    });
  </script>
</body>
</html>
